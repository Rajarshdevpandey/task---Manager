<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:white;
width:100%;
max-width:700px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

.input-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.add-btn{
background:#4CAF50;
color:white;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#f5f5f5;
margin-top:10px;
border-radius:10px;
}

.completed{
text-decoration:line-through;
color:gray;
}

.actions button{
margin-left:5px;
}

.complete-btn{
background:#2196F3;
color:white;
}

.delete-btn{
background:#f44336;
color:white;
}

.stats{
margin-top:15px;
text-align:center;
font-weight:bold;
}

footer{
margin-top:20px;
text-align:center;
color:#666;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Task Management Application</h1>

<div class="input-box">
<input type="text" id="taskInput" placeholder="Enter a task">
<button class="add-btn" onclick="addTask()">Add Task</button>
</div>

<div id="taskList"></div>

<div class="stats">
Total Tasks: <span id="count">0</span>
</div>

<footer>
Created by Rajarshdev Pandey
</footer>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks", JSON.stringify(tasks));
renderTasks();
}

function addTask(){
const input = document.getElementById("taskInput");

if(input.value.trim()==="") return;

tasks.push({
text: input.value,
completed:false
});

input.value="";
saveTasks();
}

function toggleTask(index){
tasks[index].completed=!tasks[index].completed;
saveTasks();
}

function deleteTask(index){
tasks.splice(index,1);
saveTasks();
}

function renderTasks(){

const taskList=document.getElementById("taskList");

taskList.innerHTML="";

tasks.forEach((task,index)=>{

taskList.innerHTML += `
<div class="task">

<span class="${task.completed ? 'completed':''}">
${task.text}
</span>

<div class="actions">
<button class="complete-btn"
onclick="toggleTask(${index})">
✔
</button>

<button class="delete-btn"
onclick="deleteTask(${index})">
🗑
</button>
</div>

</div>
`;

});

document.getElementById("count").innerText=tasks.length;
}

renderTasks();

</script>

</body>
